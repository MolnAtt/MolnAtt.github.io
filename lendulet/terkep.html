<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Térkép</title>
    <link rel="stylesheet" href="terkep.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

        <div id="telepulesnev">Településnév</div>

        <div id="osm_coord">koordináták az OSM-ből</div>
        <button id="osmgomb">Ugrás az OSM koordinátákhoz</button>
        <div id="tavolsag">Távolság</div>
        <div id="figyelmezteto">Ez OK</div>
